server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: auth-service
  zipkin:
    enabled: false
  flyway:
    enabled: false
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/auth_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:test}:${EUREKA_PASSWORD:test}@${EUREKA_HOST:localhost}:8761/eureka/
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
    instance-info-replication-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    health-check-url-path: /actuator/health
    metadata-map:
      version: 1.0.0

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key-my-super-secret-key-1234567890}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

multitenancy:
  header: X-Tenant-ID

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: INFO
    com.microservices.auth: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG               # shows SQL queries
    org.hibernate.orm.jdbc.bind: TRACE     # shows parameter values (Spring Boot 3.x)
    org.springframework.jdbc.core: DEBUG
 